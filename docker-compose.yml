services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: semester_countdown
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d semester_countdown"]
      interval: 5s
      timeout: 5s
      retries: 10

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/semester_countdown
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/semester_countdown
      PORT: 5000
      FLASK_DEBUG: "0"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
