<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semester Countdown</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container start-page">
        <h1>Semester Countdown</h1>

        <p class="semester-line">
            Semester:
            {% if semester %}
                {{ semester.semester_name }}
            {% else %}
                Kein aktuelles Semester gefunden
            {% endif %}
        </p>

        <div class="button-group">
            <a href="/countdown/contact" class="menu-button">Kontaktstudium</a>
            <a href="/countdown/exam" class="menu-button">Prüfungsphase</a>
        </div>
    </div>
</body>
</html>
